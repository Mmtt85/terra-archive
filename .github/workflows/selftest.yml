# 시크릿 셀프테스트 — 등록한 6개 시크릿이 실제로 유효한지 한 번에 점검한다.
# Actions 탭 → selftest → Run workflow 로 수동 실행. 사이트는 건드리지 않는다(읽기·테스트메일만).
name: selftest

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Cloudflare API 토큰 유효성
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "▶ 토큰 verify"
          ok=$(curl -s https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.success')
          if [ "$ok" = "true" ]; then echo "✅ CLOUDFLARE_API_TOKEN 유효"; else echo "❌ CLOUDFLARE_API_TOKEN 무효 또는 미등록"; exit 1; fi

      - name: Cloudflare 계정ID + Pages 권한
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "▶ Pages 프로젝트 조회 (계정ID + Pages Edit 권한 동시 확인)"
          resp=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects" \
            -H "Authorization: Bearer $CF_TOKEN")
          ok=$(echo "$resp" | jq -r '.success')
          if [ "$ok" = "true" ]; then
            echo "✅ CLOUDFLARE_ACCOUNT_ID + Pages 권한 정상"
            echo "   프로젝트: $(echo "$resp" | jq -r '.result[].name' | tr '\n' ' ')"
          else
            echo "❌ 계정ID 틀렸거나 토큰에 Cloudflare Pages:Edit 권한이 없음"
            echo "$resp" | jq -r '.errors'
            exit 1
          fi

      - name: Claude 구독 토큰 (LLM 레인용)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "⚠ CLAUDE_CODE_OAUTH_TOKEN 미등록 — LLM 레인(AI 요약)은 못 돈다 (결정론 레인엔 무관)"
            exit 0
          fi
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1
          out=$(claude -p "Reply with exactly: PONG" --max-turns 1 2>&1 || true)
          echo "응답: $out"
          if echo "$out" | grep -qi "PONG"; then echo "✅ CLAUDE_CODE_OAUTH_TOKEN 유효 (구독 인증 OK)"; else echo "❌ Claude 토큰 인증 실패 — claude setup-token 재발급 필요"; exit 1; fi

      - name: 테스트 이메일 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: 테라 아카이브 봇 <${{ secrets.MAIL_USERNAME }}>
          subject: "[테라아카이브] 셀프테스트 — 이메일 정상 ✅"
          body: "이 메일이 도착했다면 MAIL_USERNAME/PASSWORD/TO 3개 시크릿이 모두 정상입니다. 무인 유지보수 리포트가 여기로 옵니다."

      - name: 요약
        if: always()
        run: echo "✔ 셀프테스트 완료 — 위 단계별 ✅/❌ 확인. 이메일도 받은편지함에서 확인하세요."
