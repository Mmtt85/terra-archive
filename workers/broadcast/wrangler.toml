# 명일방주 공식 방송 + 게임 데이터 감지 워커 (사이트 배포와 별개)
# - 6시간마다: 유튜브 공식 채널 3개(한국/일본/글로벌)에서 예약·라이브 방송을 조회해 KV에 저장 → GET /
# - 매일 11:41 KST: 클뜯 레포에서 오퍼 목록·공채 풀 요약을 KV에 저장 → GET /datacheck (/admin이 비교)
# 배포: `bash deploy.sh` / 시크릿: `npx wrangler secret put YOUTUBE_API_KEY`
name = "terra-archive-broadcast"
main = "src/index.js"
compatibility_date = "2026-07-01"

[triggers]
crons = ["23 */6 * * *", "41 2 * * *"]

[[kv_namespaces]]
binding = "BCAST"
id = "b6445de857bc40fc83595aa8132ccd75"
